# mdchirp NAS 백엔드 — Docker Compose
# 시놀로지 Container Manager '프로젝트'로 이 파일을 사용.
# 빌드 컨텍스트는 monorepo 루트(../../) — shared 패키지를 함께 빌드하기 위함.
services:
  backend:
    container_name: mdchirp-backend
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - '8787:8787'
    volumes:
      # 왼쪽(호스트 NAS 경로)을 본인 환경에 맞게 바꾸세요. (가이드 참조)
      # 글 데이터 + secrets.json + settings.json + git 워킹카피가 모두 여기 영구 저장됩니다.
      - /volume1/docker/mdchirp/data:/data/mdchirp
    environment:
      - PORT=8787
      - MDCHIRP_DATA_DIR=/data/mdchirp
      # 컨테이너 시간대(NAS 위치 기준). nas 모드 발행 시각이 이 값을 따른다.
      - TZ=Asia/Seoul
      # (서브 방식) Gemini 키를 여기서 직접 주입하려면 아래 주석 해제.
      # 기본 권장은 앱 '설정' 메뉴에서 저장하는 것(secrets.json). 가이드 참조.
      # - GEMINI_API_KEY=여기에_키
      # - GEMINI_MODEL=gemini-2.0-flash
